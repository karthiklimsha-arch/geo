<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Login - Geo-Attendance</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Segoe UI", Arial, sans-serif;
}

/* NAVBAR */

.navbar{
width:100%;
background:#132c4b;
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 60px;
color:white;
}

.logo{
display:flex;
align-items:center;
gap:10px;
font-size:20px;
font-weight:600;
}

.home-btn{
color:white;
text-decoration:none;
font-size:16px;
}

/* PAGE BACKGROUND */

body{
height:100vh;
background-image:url("file:///C:/Users/Sreehari/Downloads/geo/Gemini_Generated_Image_k7wupuk7wupuk7wu.png");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
display:flex;
flex-direction:column;
}

/* LOGIN CONTAINER */

.login-container{
flex:1;
display:flex;
justify-content:center;
align-items:center;
}

/* LOGIN BOX */

.login-box{
background:rgba(255,255,255,0.95);
padding:40px;
border-radius:12px;
width:350px;
box-shadow:0 10px 30px rgba(0,0,0,0.35);
text-align:center;
}

.login-box h2{
margin-bottom:25px;
color:#132c4b;
}

/* INPUT FIELDS */

.input-group{
margin-bottom:18px;
text-align:left;
}

.input-group label{
font-size:14px;
font-weight:600;
}

.input-group input{
width:100%;
padding:10px;
margin-top:6px;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
}

/* LOGIN BUTTON */

.login-btn{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:6px;
background:#132c4b;
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

.login-btn:hover{
background:#0b1f36;
}

</style>
</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

<div class="logo">
<i class="fas fa-user-graduate"></i>
Student Login
</div>

<a href="file:///C:/Users/Sreehari/Downloads/geo/geohome.html.html" class="home-btn">
<i class="fas fa-home"></i> Home
</a>

</div>

<!-- LOGIN FORM -->

<div class="login-container">

<div class="login-box">

<h2>Student Login</h2>

<div class="input-group">
<label>Student ID</label>
<input type="text" placeholder="Enter Student ID">
</div>

<div class="input-group">
<label>Password</label>
<input type="password" placeholder="Enter Password">
</div>

<button class="login-btn">Login</button>

</div>

</div>

</body>
</html>
