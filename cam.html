<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Face Attendance - Geo Attendance</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Segoe UI", Arial, sans-serif;
}

/* NAVBAR */

.navbar{
width:100%;
background:#132c4b;
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 60px;
color:white;
}

.logo{
display:flex;
align-items:center;
gap:10px;
font-size:20px;
font-weight:600;
}

.home-btn{
color:white;
text-decoration:none;
font-size:16px;
}

/* PAGE BACKGROUND */

body{
height:100vh;
background-image:url("file:///C:/Users/Sreehari/Downloads/geo/Gemini_Generated_Image_k7wupuk7wupuk7wu.png");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
display:flex;
flex-direction:column;
}

/* MAIN CONTAINER */

.main-container{
flex:1;
display:flex;
justify-content:center;
align-items:center;
}

/* SCAN BOX */

.scan-box{
background:rgba(255,255,255,0.95);
padding:40px;
border-radius:12px;
width:520px;
box-shadow:0 10px 30px rgba(0,0,0,0.35);
text-align:center;
}

.scan-box h2{
margin-bottom:20px;
color:#132c4b;
}

/* CAMERA BOX */

.camera-box{
width:100%;
height:350px;
border-radius:10px;
border:3px solid #132c4b;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
background:#000;
margin-bottom:20px;
}

.camera-box video{
width:100%;
height:100%;
object-fit:cover;
}

/* ATTENDANCE BUTTON */

.attendance-btn{
width:100%;
padding:14px;
border:none;
border-radius:6px;
background:#132c4b;
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

.attendance-btn:hover{
background:#0b1f36;
}

</style>
</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

<div class="logo">
<i class="fas fa-camera"></i>
Face Attendance
</div>

<a href="file:///C:/Users/Sreehari/Downloads/geo/geohome.html.html" class="home-btn">
<i class="fas fa-home"></i> Home
</a>

</div>


<!-- FACE SCAN SECTION -->

<div class="main-container">

<div class="scan-box">

<h2>Student Face Verification</h2>

<!-- CAMERA BOX -->

<div class="camera-box">
<video id="video" autoplay></video>
</div>

<!-- MARK ATTENDANCE BUTTON -->

<button class="attendance-btn">Mark Attendance</button>

</div>

</div>

<script>

/* CAMERA ACCESS */

const video = document.getElementById('video');

navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {
video.srcObject = stream;
})
.catch(err => {
alert("Camera access denied!");
});

</script>

</body>
</html>
