<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geo-Attendance</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Segoe UI", Arial, sans-serif;
}

/* NAVBAR */

.navbar{
position:fixed;
width:100%;
top:0;
background:#132c4b;
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 60px;
z-index:1000;
}

.logo{
display:flex;
align-items:center;
gap:10px;
color:white;
font-size:20px;
font-weight:600;
}

.logo img{
height:34px;
}

.nav-links{
display:flex;
gap:30px;
}

.nav-links a{
color:white;
text-decoration:none;
cursor:pointer;
}

.menu-btn{
display:none;
font-size:26px;
color:white;
cursor:pointer;
}

/* HERO BACKGROUND IMAGE */

.hero{
height:100vh;
background-image:url("file:///C:/Users/Sreehari/Downloads/geo/WhatsApp%20Image%202026-03-10%20at%2020.33.55.jpeg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

.overlay{
background:rgba(0,0,0,.55);
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
}

.hero h1{
font-size:60px;
}

.hero p{
font-size:20px;
margin-top:10px;
}

/* SESSION BUTTONS */

.features{
display:flex;
justify-content:center;
gap:40px;
margin-top:-80px;
}

/* IMPROVED CARD DESIGN */

.card{
width:300px;
padding:45px;
border-radius:18px;
color:white;
text-align:center;
cursor:pointer;
transition:all 0.35s ease;
box-shadow:0 12px 30px rgba(0,0,0,.25);
position:relative;
overflow:hidden;
text-decoration:none;
}

/* ICON */

.card i{
font-size:52px;
margin-bottom:15px;
transition:0.35s;
}

/* TEXT */

.card h3{
font-size:22px;
font-weight:600;
letter-spacing:0.5px;
}

/* HOVER EFFECT */

.card:hover{
transform:translateY(-14px) scale(1.07);
box-shadow:0 25px 50px rgba(0,0,0,.35);
}

/* ICON ANIMATION */

.card:hover i{
transform:scale(1.25) rotate(8deg);
}

/* SHINE EFFECT */

.card::before{
content:"";
position:absolute;
top:0;
left:-100%;
width:100%;
height:100%;
background:rgba(255,255,255,0.25);
transform:skewX(-25deg);
transition:0.6s;
}

.card:hover::before{
left:130%;
}

/* GRADIENT COLORS */

.green{
background:linear-gradient(135deg,#1e9b83,#2bc0a4,#3fe0c2);
}

.blue{
background:linear-gradient(135deg,#2d6aa8,#3f89da,#5ca8ff);
}

/* TAGLINE */

.tagline{
text-align:center;
padding:80px 20px;
font-size:32px;
color:#2d3b50;
}

/* FOOTER */

.footer{
text-align:center;
padding:20px;
background:#132c4b;
color:white;
}

/* CONTACT MODAL */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
padding:30px;
border-radius:10px;
text-align:center;
width:300px;
}

.close{
position:absolute;
top:20px;
right:30px;
font-size:25px;
cursor:pointer;
}

/* MOBILE */

@media(max-width:768px){

.menu-btn{
display:block;
}

.nav-links{
position:absolute;
top:70px;
right:0;
background:#132c4b;
flex-direction:column;
width:200px;
padding:20px;
display:none;
}

.nav-links.show{
display:flex;
}

.features{
flex-direction:column;
align-items:center;
margin-top:-50px;
}

}

</style>
</head>

<body>

<nav class="navbar">

<div class="logo">
<img src="logo.png">
Geo-Attendance
</div>

<div class="menu-btn" onclick="toggleMenu()">☰</div>

<div class="nav-links" id="navLinks">
<a href="#">Stories</a>
<a href="#">FAQ</a>
<a onclick="openContact()">Contact</a>
</div>

</nav>

<section class="hero">

<div class="overlay">

<h1>GEO-ATTEND</h1>
<p>GPS-BASED AUTOMATIC ATTENDANCE SYSTEM</p>

</div>

</section>

<section class="features">

<a href="file:///C:/Users/Sreehari/Downloads/geo/stud.html" class="card green">
<i class="fas fa-user-graduate"></i>
<h3>Student Session</h3>
</a>

<a href="file:///C:/Users/Sreehari/Downloads/geo/fac.html" class="card blue">
<i class="fas fa-chalkboard-teacher"></i>
<h3>Faculty Session</h3>
</a>

</section>

<div class="tagline">
Innovate. Automate. Educate
</div>

<div class="footer">
© 2025 Geo-Attendance
</div>

<div id="contactModal" class="modal">

<div class="modal-content">

<span class="close" onclick="closeContact()">×</span>

<h2>Admin Contact</h2>

<p><strong>Karthik</strong></p>
<p>📞 6238616345</p>
<p>✉️ karthikanil2905@gmail.com</p>

</div>

</div>

<script>

function toggleMenu(){
document.getElementById("navLinks").classList.toggle("show");
}

function openContact(){
document.getElementById("contactModal").style.display="flex";
}

function closeContact(){
document.getElementById("contactModal").style.display="none";
}

window.onclick=function(event){
let modal=document.getElementById("contactModal");
if(event.target==modal){
modal.style.display="none";
}
}

</script>

</body>
</html>
